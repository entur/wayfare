version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /clients/tanstack-start
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: /bffs/python-fastapi
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      python-dependencies:
        patterns:
          - "*"
