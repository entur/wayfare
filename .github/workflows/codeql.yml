name: "CodeQL"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
  schedule:
    - cron: "0 3 * * MON"

permissions: {}

jobs:
  code-scan:
    name: Code Scan
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: entur/gha-security/.github/workflows/code-scan.yml@v2
    secrets: inherit
    with:
      ignore_language: "cpp,swift,kotlin"
